# Schema for the TI Service Provider Metadata JSON object
$schema: "http://json-schema.org/draft-07/schema#"
title: TI Service Provider Metadata JSON Object
description: Schema for the TI Service Provider Metadata JSON object.
type: object
properties:
  resource_fqdn:
    type: string
    description: >-
      Fully Qualified Domain Name for the TI Service Provider.
    format: hostname
  scheme:
    type: string
    description: >-
      The scheme used for the TI Service Provider. This MUST be `https`.
    enum: [https]
  cache_ttl:
    type: integer
    description: >-
      The time-to-live in seconds for the cached metadata. This is the maximum
      time that the metadata should be cached before it needs to be refreshed.
required:
  - resource_fqdn
  - scheme
  - cache_ttl
