# Hostname (without scheme) for the external ZETA deployment.
# The value is reused for HTTPS and WSS targets by the features and the tiger config.
# Override via environment variable ZETA_BASE_URL or Maven property -Dzeta_base_url=....
zeta_base_url: zeta-kind.local

zeta_proxy_url: localhost:9999

zeta_k8s_namespace: zeta-local

allow_deployment_modification: false

zeta_k8s_command_timeout: 60

zeta_k8s_pod_ready_timeout: 120

# OpenSearch host (without scheme) for telemetry lookups.
# Override via environment variable OPENSEARCH_URL or Maven property -Dopensearch_url=....
opensearch_url: ${zeta_base_url}:9200

# Directory of the sibling zeta-test-certificates checkout.
# Override via environment variable ZETA_TEST_CERTIFICATES_DIR or Maven property
# -DtestCertificates.dir=....
testCertificates.dir: ../zeta-test-certificates

# TLS Test Tool Service URL
# Override via environment variable ZETA_TLS_TEST_TOOL_SERVICE_URL or Maven property
# -Dzeta_tls_test_tool_service_url=....
zeta_tls_test_tool_service_url: ${zeta_base_url}:9012
